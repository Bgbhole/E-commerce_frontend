<!DOCTYPE html>

<html>
<head>
    <title>Change Password</title>
    <link rel="stylesheet" href="ChangePasswordSeller.css">
</head>
<body>

<div class="container">

<h2>Change Password</h2>

<button onclick="sendOTP()">
    Send OTP
</button>

<input type="text"
       id="otp"
       placeholder="Enter OTP">

<input type="password"
       id="newPassword"
       placeholder="New Password">

<input type="password"
       id="confirmPassword"
       placeholder="Confirm Password">

<button onclick="changePassword()">
    Change Password
</button>

</div>

<script src="ChangePasswordSeller.js"></script>

</body>
</html>
