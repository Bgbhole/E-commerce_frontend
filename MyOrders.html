<!DOCTYPE html>
<html>

<head>
    <title>My Orders</title>
    <link rel="stylesheet" href="MyOrders.css">
</head>

<body>

    <div class="container">

        <div class="header">

            <h1>My Orders</h1>

            <input type="text"
                   id="searchBox"
                   placeholder="Search your orders">

        </div>

        <div class="filters">
<div class="filters">

    <button onclick="filterOrders('ALL')">All</button>

    <button onclick="filterOrders('ORDER_CONFIRMED')">
        Confirmed
    </button>

    <button onclick="filterOrders('PACKED')">
        Packed
    </button>

    <button onclick="filterOrders('SHIPPED')">
        Shipped
    </button>

    <button onclick="filterOrders('OUT_FOR_DELIVERY')">
        Out For Delivery
    </button>

    <button onclick="filterOrders('DELIVERED')">
        Delivered
    </button>

    <button onclick="filterOrders('CANCELLED')">
        Cancelled
    </button>

</div>

        </div>

        <!-- Orders will be loaded dynamically here -->
        <div id="orderList"></div>

    </div>

    <script src="api-config.js"></script>
    <script src="MyOrders.js"></script>

</body>

</html>
