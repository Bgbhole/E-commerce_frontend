
<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="ProductDetails.css">
</head>
<body>
<div class="top-bar">

    <button class="nav-btn" onclick="window.location.href='index.html'">
        🏠 Home
    </button>

    <button class="nav-btn" onclick="history.back()">
        ← Back
    </button>

</div>
<div class="container">

    <div class="left">

        <img id="productImage" alt="Product Image">

        <div class="buttons">
            <p id="stockStatus"></p>

<button
id="addToCartBtn"
onclick="addToCart()">

    Add To Cart

</button>

<button
id="buyNowBtn"
onclick="buyNow()">

    Buy Now

</button>
        </div>

    </div>

    <div class="right">

        <h1 id="name"></h1>

        <div class="rating">
            ★★★★☆ <span id="rating">4.3</span>
        </div>

        <div class="price-section">
            <span id="price"></span>
            <span class="mrp">₹9999</span>
            <span class="discount">30% OFF</span>
        </div>

        <div class="offers">
            <h3>Available Offers</h3>

            <p>✔ Bank Offer 10% Instant Discount</p>
            <p>✔ Free Delivery Available</p>
            <p>✔ Cash On Delivery Available</p>

        </div>

        <h3>About this Item</h3>

        <p id="description"></p>

        <h3>Specifications</h3>

        <table class="spec-table">
    <tbody id="specificationTable">

    </tbody>
</table>

    </div>

</div>

<script src="api-config.js"></script>
<script src="ProductDetails.js"></script>

</body>
</html>
