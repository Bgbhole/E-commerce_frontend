<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ShopKart Admin Panel</title>

<link rel="stylesheet" href="AdminDashboard.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
<h2>ShopKart</h2>
<p>Admin Panel</p>
</div>

<ul>

<li class="active" onclick="showPage('dashboard')">
    <i class="fa fa-chart-line"></i>
    Dashboard
</li>

<li onclick="showPage('users')">
    <i class="fa fa-users"></i>
    Customers
</li>

<li onclick="showPage('sellers')">
    <i class="fa fa-store"></i>
    Sellers
</li>

<li onclick="showPage('products')">
    <i class="fa fa-box"></i>
    Products
</li>

<li onclick="showPage('orders')">
    <i class="fa fa-cart-shopping"></i>
    Orders
</li>

<li onclick="showPage('transactions')">
    <i class="fa fa-credit-card"></i>
    Payments
</li>

<li onclick="logout()">
<i class="fa fa-sign-out-alt"></i>
Logout
</li>

</ul>

</aside>

<!-- MAIN -->

<main class="main">

<header class="topbar">

<div>

<h1 id="pageTitle">
Dashboard
</h1>

<p>
Marketplace Administration
</p>

</div>

<div class="admin-profile">

<i class="fa fa-user-shield"></i>

<span id="adminName">
Administrator
</span>

</div>

</header>

<!-- DASHBOARD CARDS -->

<section id="dashboardCards" class="cards">

<div class="card">

<i class="fa fa-users"></i>

<div>

<h2 id="usersCount">0</h2>

<p>Customers</p>

</div>

</div>

<div class="card">

<i class="fa fa-store"></i>

<div>

<h2 id="sellerCount">0</h2>

<p>Sellers</p>

</div>

</div>

<div class="card">

<i class="fa fa-box"></i>

<div>

<h2 id="productCount">0</h2>

<p>Products</p>

</div>

</div>

<div class="card">

<i class="fa fa-shopping-cart"></i>

<div>

<h2 id="orderCount">0</h2>

<p>Orders</p>

</div>

</div>

</section>


<!-- TOOLBAR -->

<section class="toolbar">

<input

type="text"

id="searchInput"

placeholder="Search..."

onkeyup="searchTable()">

<select id="statusFilter">

<option value="ALL">All Status</option>

<option value="PENDING">Pending</option>

<option value="ACTIVE">Active</option>

<option value="REJECTED">Rejected</option>

</select>

<select id="categoryFilter">

<option value="">All Categories</option>

<option>Fashion</option>

<option>Mobiles</option>

<option>Electronics</option>

<option>Furniture</option>

<option>Books</option>

<option>Beauty</option>

</select>

</section>

<!-- TABLE -->

<div id="tableArea">

</div>

</main>

<!-- MODALS -->

<div id="modalContainer">

</div>

<script src="api-config.js"></script>
<script src="common.js"></script>
<script src="orders.js"></script>
<script src="payments.js"></script>
<script src="AdminDashboard.js"></script>

</body>
</html>
