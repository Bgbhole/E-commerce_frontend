<!DOCTYPE html>
<html>
<head>
    <title>Manage Address</title>
    <link rel="stylesheet" href="Address.css">
</head>
<body>
<div class="top-bar">

    <button class="nav-btn" onclick="window.location.href='index.html'">
        🏠 Home
    </button>

    <button class="nav-btn" onclick="history.back()">
        ← Back
    </button>

</div>
<div class="container">

    <h2>Manage Addresses</h2>

    <div class="address-form">

        <input type="text"
               id="fullName"
               placeholder="Full Name">

        <input type="text"
               id="mobile"
               placeholder="Mobile Number">

        <textarea id="address"
                  placeholder="House No, Street, Area"></textarea>

        <input type="text"
               id="city"
               placeholder="City">

        <input type="text"
               id="state"
               placeholder="State">

        <input type="text"
               id="pincode"
               placeholder="Pincode">

        <button onclick="addAddress()">
            Add Address
        </button>

    </div>

    <hr>

    <h3>Saved Addresses</h3>

    <div id="addressList">

    </div>

</div>

<script src="api-config.js"></script>
<script src="Address.js"></script>

</body>
</html>
