<!DOCTYPE html>
<html>
<head>
    <title>Earnings</title>
    <link rel="stylesheet" href="Earnings.css">
</head>
<body>

<h1>Earnings Dashboard</h1>

<div class="cards">

    <div class="card">
        <h3>Today's Earnings</h3>
        <h1 id="today">₹0</h1>
    </div>

    <div class="card">
        <h3>Monthly Earnings</h3>
        <h1 id="monthly">₹0</h1>
    </div>

    <div class="card">
        <h3>Total Earnings</h3>
        <h1 id="total">₹0</h1>
    </div>

    <div class="card">
        <h3>Total Profit</h3>
        <h1 id="profit">₹0</h1>
    </div>

</div>

<script src="Earnings.js"></script>

</body>
</html>
