<!DOCTYPE html>

<html>
<head>
    <title>Admin Registration</title>
    <link rel="stylesheet" href="RegisterAdmin.css">
</head>
<body>

<div class="container">

<h2>Admin Registration</h2>

<input type="text"
       id="firstName"
       placeholder="First Name">

<input type="text"
       id="lastName"
       placeholder="last Name">

    <input type="text"
       id="CompanyIdNumber"
       placeholder="Company ID Number">

<input type="email"
       id="email"
       placeholder="Email Address">

       id="mobile"

<input type="password"
       id="confirmPassword"

<button onclick="registerAdmin()">
    Register Admin
</button>


</div>

<script src="RegisterAdmin.js"></script>

</body>
</html>
