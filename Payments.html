<!DOCTYPE html>
<html>

<head>

    <title>Payment</title>

    <link rel="stylesheet" href="Payments.css">

</head>

<body>

    <!-- Top Bar -->

    <div class="top-bar">

        <button class="nav-btn" onclick="window.location.href='index.html'">
            🏠 Home
        </button>

        <button class="nav-btn" onclick="history.back()">
            ← Back
        </button>

    </div>

    <!-- Payment Section -->

    <div class="payment-section">

        <!-- Gift Card -->

        <div class="payment-card">

            <h3>🎁 Gift Cards</h3>

            <div id="giftCardList"></div>

        </div>


        <!-- Cash On Delivery -->

        <div class="payment-card">

            <h3>💵 Cash on Delivery</h3>

            <div class="option">

                <input type="radio"
                       id="codOption"
                       name="paymentMethod"
                       value="COD">

                <label for="codOption">

                    <strong>Cash on Delivery</strong>

                    <p>Pay when your order is delivered.</p>

                </label>

            </div>

        </div>


        <!-- UPI -->

        <div class="payment-card">

            <h3>💳 UPI</h3>

            <input
                type="text"
                id="upiId"
                placeholder="Enter UPI ID">

            <button onclick="addUpi()">

                Add UPI

            </button>

            <div id="upiList"></div>

        </div>


        <!-- Cards -->

        <div class="payment-card">

            <h3>💳 Credit / Debit Cards</h3>

            <input
                type="text"
                id="cardName"
                placeholder="Card Holder Name">

            <input
                type="text"
                id="cardNumber"
                placeholder="Card Number">

            <input
                type="text"
                id="expiryDate"
                placeholder="MM/YY">

            <input
                type="password"
                id="cvv"
                placeholder="CVV">

            <button onclick="addCard()">

                Add Card

            </button>

            <div id="cardList"></div>

        </div>

    </div>


    <!-- Total -->

    <div class="price-box">

        <h2>

            Total Amount ₹<span id="payAmount">0</span>

        </h2>

        <button
            class="pay-btn"
            onclick="payNow()">

            PAY NOW

        </button>

    </div>

    <script src="api-config.js"></script>

    <script src="Payments.js"></script>

</body>

</html>
