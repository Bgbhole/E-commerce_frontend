<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Payment</title>

    <link rel="stylesheet"
          href="Payments.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ================= TOP BAR ================= -->

<div class="top-bar">

    <button class="nav-btn"
            onclick="window.location.href='index.html'">
        🏠 Home
    </button>

    <button class="nav-btn"
            onclick="history.back()">
        ← Back
    </button>

</div>

<!-- ================= PAYMENT ================= -->

<div class="payment-container">

    <div class="payment-section">

        <!-- ================= Gift Card ================= -->

        <div class="payment-card">

            <h3>🎁 Gift Cards</h3>

            <div id="giftCardList"></div>

        </div>

        <!-- ================= COD ================= -->

        <div class="payment-card">

            <h3>💵 Cash on Delivery</h3>

            <div class="option">

                <div class="option-left">

                    <input
                        type="radio"
                        id="codOption"
                        name="paymentMethod"
                        value="COD">

                    <label for="codOption">

                        <strong>Cash on Delivery</strong>

                        <p>Pay when your order is delivered.</p>

                    </label>

                </div>

            </div>

        </div>

        <!-- ================= UPI ================= -->

        <div class="payment-card">

            <h3>📱 UPI</h3>

            <div id="upiList">

                <!-- Loaded dynamically -->

            </div>

            <div class="upi-footer">

                <button
                    class="add-upi-btn"
                    onclick="openUpiModal()">

                    <i class="fa-solid fa-plus"></i>

                    Add New UPI

                </button>

            </div>

        </div>

        <!-- ================= CARD ================= -->

        <div class="payment-card">

            <h3>💳 Credit / Debit Card</h3>

            <input
                type="text"
                id="cardName"
                placeholder="Card Holder Name">

            <input
                type="text"
                id="cardNumber"
                placeholder="Card Number">

            <div class="card-row">

                <input
                    type="text"
                    id="expiryDate"
                    placeholder="MM/YY">

                <input
                    type="password"
                    id="cvv"
                    placeholder="CVV">

            </div>

            <button
                class="add-btn"
                onclick="addCard()">

                Save Card

            </button>

            <div id="cardList"></div>

        </div>

    </div>

    <!-- ================= PRICE BOX ================= -->

    <div class="price-box">

        <h2>Order Summary</h2>

        <hr>

        <div class="price-row">

            <span>Total Amount</span>

            <span>

                ₹<span id="payAmount">0</span>

            </span>

        </div>

        <hr>

        <button
            class="pay-btn"
            onclick="payNow()">

            <i class="fa-solid fa-lock"></i>

            PAY SECURELY

        </button>

    </div>

</div>

<!-- ================= UPI MODAL ================= -->

<div
    id="upiModal"
    class="modal">

    <div class="modal-content">

        <h2>Add UPI</h2>

        <input
            type="hidden"
            id="upiId">

        <div class="form-group">

            <label>

                UPI ID

            </label>

            <input
                type="text"
                id="upiValue"
                placeholder="example@upi">

        </div>

        <div class="modal-buttons">

            <button
                class="cancel-btn"
                onclick="closeUpiModal()">

                Cancel

            </button>

            <button
                class="save-btn"
                onclick="saveUpi()">

                Save

            </button>

        </div>

    </div>

</div>

<script src="api-config.js"></script>

<script src="Payments.js"></script>

</body>

</html>
