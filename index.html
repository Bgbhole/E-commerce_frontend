<!DOCTYPE html>
<html>
<head>
    <title>ShopKart</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">

    <div class="logo">ShopKart</div>

    <input type="text" id="search" placeholder="Search products">

   <div class="menu">

    <a href="#"
       id="loginBtn"
       onclick="goLogin()">
       Login
    </a>

    <a href="#"
       id="profileBtn"
       onclick="openProfile()"
       style="display:none;">
       Profile
    </a>

    <a href="#"
       onclick="openWishlist()">
        ❤️ Wishlist (<span id="wishCount">0</span>)
    </a>

    <a href="#"
       onclick="openCart()">
        🛒 Cart (<span id="count">0</span>)
    </a>

    <a href="#"
       id="logoutBtn"
       onclick="logout()"
       style="display:none;">
       Logout
    </a>

    <!-- Admin Login -->
   <a href="admin-log.html" id="adminLink">🧑 Admin</a>

</div>


</div>

<!-- Categories -->
<div class="category">

    <button onclick="showCategory('Mobiles')">📱 Mobiles</button>

    <button onclick="showCategory('Electronics')">💻 Electronics</button>

    <button onclick="showCategory('Fashion')">👕 Fashion</button>

    <button onclick="showAll()">🛍️ All Products</button>

</div>

<!-- Banner -->
<div class="slider">

    <div class="banner-content">

        <div class="banner-text">

            <h1 id="bannerName"></h1>

            <h2 id="bannerPrice"></h2>

            <p id="bannerDiscount"></p>

            <button id="bannerBtn">
                Shop Now
            </button>

        </div>

        <div class="banner-image">

            <img id="banner">

        </div>

    </div>

</div>

<!-- Deals -->
<div class="section-title">
    <h2>🔥 Deals Of The Day</h2>
</div>

<div class="products" id="products">

</div>

<!-- Trending -->
<div class="section-title">
    <h2>⭐ Trending Products</h2>
</div>

<div class="products" id="trendingProducts">

</div>

<!-- Recommended -->
<div class="section-title">
    <h2>👍 Recommended For You</h2>
</div>

<div class="products" id="recommendedProducts">

</div>

<!-- Footer -->
<div class="footer">

    <div>
        <h3>About</h3>
        <p>Contact Us</p>
        <p>About Us</p>
        <p>Careers</p>
    </div>

    <div>
        <h3>Help</h3>
        <p>Payments</p>
        <p>Shipping</p>
        <p>Cancellation</p>
        <p>FAQ</p>
    </div>

    <div>
        <h3>Policy</h3>
        <p>Terms Of Use</p>
        <p>Privacy Policy</p>
        <p>Return Policy</p>
    </div>

</div>

<script src="api-config.js"></script>
<script src="index.js"></script>

</body>
</html>
