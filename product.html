<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="product.css">
</head>
<body>
    <div class="container">

    <div class="left">

        <div class="image-box">
            <img id="productImage" src="" alt="Product">
        </div>

        <div class="buttons">
            <button class="cart-btn" onclick="addCart()">
                ADD TO CART
            </button>

            <button class="buy-btn">
                BUY NOW
            </button>
        </div>

    </div>

    <div class="right">

        <h1 id="productName"></h1>

        <div class="price-section">
            <span class="price" id="productPrice"></span>
            <span class="old-price">₹29999</span>
            <span class="discount">60% OFF</span>
        </div>

        <div class="offer-box">
            <h3>Available Offers</h3>

            <ul>
                <li>✔ Bank Offer 10% Instant Discount</li>
                <li>✔ Free Delivery</li>
                <li>✔ No Cost EMI Available</li>
                <li>✔ 7 Days Replacement Policy</li>
            </ul>
        </div>

        <div class="description-box">

            <h3>Description</h3>

            <p id="productDescription">
                High quality product with excellent performance and premium build.
            </p>

        </div>

       

        </div>

    </div>

</div>
</body>
</html>
